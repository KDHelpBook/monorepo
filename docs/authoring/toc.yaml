# Table of contents for the authoring guide.  The whole book hangs under its
# index page (one collapsible root per volume — the three volumes share a
# collection and merge into one tree, so each needs its own root).  Folder
# nodes (`title:` only, no `page:`) group their children; page nodes take
# their label from the page title.
- page: index
  children:
    - page: getting-started
    - page: differences
    - page: compiling
    - title: Reference
      children:
        # One Markdown section: each base construct sits next to its KD Help
        # Book extension (code-blocks/
        # code-extensions).
        - title: Markdown
          children:
            - page: headings
            - page: text-formatting
            - page: lists
            - page: links
            - page: images
            - page: tables
            - page: blockquotes
            - page: callouts
            - page: code-blocks
            - page: code-extensions
            - page: footnotes
            - page: emoji
            - page: math
        - page: frontmatter
          children:
            - page: frontmatter-id
            - page: frontmatter-title
            - page: frontmatter-keywords
            - page: frontmatter-categories
            - page: frontmatter-related
            - page: frontmatter-toc
        - page: docset-toml
          children:
            - page: docset-id
            - page: docset-title
            - page: docset-version
            - page: docset-language
            - page: docset-collection
            - page: docset-products
        - page: toc-yaml
          children:
            - page: toc-nodes
            - page: toc-ordering
