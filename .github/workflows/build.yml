name: Build

# Builds the redistributables: prebuilt `kdhelp` CLI binaries for the popular
# platforms plus the project documentation (docs/markdown) compiled to .khb.
# Runs standalone on push / PR / manual dispatch; when called by release.yml
# (release_tag set) it builds from the tag and uploads everything as release
# assets.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  workflow_call:
    inputs:
      release_tag:
        description: Existing release tag (vX.Y.Z) to build from and upload assets to
        type: string
        default: ""

permissions:
  contents: read

jobs:
  cli:
    name: CLI (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: aarch64-apple-darwin
            os: macos-latest
          # Cross-compiled on the arm64 runner; Apple's cc handles both arches.
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: compiler
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release -p kdhelp-cli --target ${{ matrix.target }}
        working-directory: compiler

      - name: Package (tar.gz)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          VERSION=$(sed -n 's/^version = "\(.*\)"$/\1/p' compiler/Cargo.toml | head -n1)
          NAME="kdhelp-v${VERSION}-${{ matrix.target }}"
          mkdir "$NAME"
          cp "compiler/target/${{ matrix.target }}/release/kdhelp" README.md LICENSE "$NAME/"
          tar czf "$NAME.tar.gz" "$NAME"

      - name: Package (zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = (Select-String -Path compiler/Cargo.toml -Pattern '^version = "(.*)"$').Matches[0].Groups[1].Value
          $name = "kdhelp-v$version-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $name | Out-Null
          Copy-Item "compiler/target/${{ matrix.target }}/release/kdhelp.exe", README.md, LICENSE $name
          Compress-Archive -Path $name -DestinationPath "$name.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: kdhelp-${{ matrix.target }}
          path: |
            kdhelp-v*-${{ matrix.target }}.tar.gz
            kdhelp-v*-${{ matrix.target }}.zip
          if-no-files-found: error

  docs:
    name: Docs (.khb)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: compiler

      - name: Build the CLI
        run: cargo build --release -p kdhelp-cli
        working-directory: compiler

      - name: Compile docs/markdown
        shell: bash
        run: |
          BIN=compiler/target/release/kdhelp
          mkdir -p out
          TAG="${{ inputs.release_tag }}"
          if [[ -n "$TAG" ]]; then
            VER="${TAG#v}"
            # Suffix the docset id with the version (build-time only, never
            # committed): archived books need unique ids to coexist with the
            # current one in the viewer's version switcher (sample-sdk pattern).
            sed -i "s/^id = \"kdhelp-markdown\"$/id = \"kdhelp-markdown-v${VER}\"/" docs/markdown/docset.toml
            grep -q "^id = \"kdhelp-markdown-v${VER}\"$" docs/markdown/docset.toml
            "$BIN" compile docs/markdown -o "out/kdhelp-markdown-v${VER}.khb"
          else
            "$BIN" compile docs/markdown -o out/markdown.khb
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: docs-khb
          path: out/*.khb
          if-no-files-found: error

  release-assets:
    name: Upload release assets
    if: inputs.release_tag != ''
    needs: [cli, docs]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: assets
          merge-multiple: true
      - name: Upload to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ inputs.release_tag }}" assets/* --clobber -R "${{ github.repository }}"
